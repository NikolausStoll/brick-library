name: "Brick Library"
slug: "brick-library"
description: "Personal brick set tracker frontend and backend"
version: "1.0.1"
url: "https://github.com/NikolausStoll/brick-library"

arch:
  - amd64
  - aarch64
  - armv7

startup: application
init: false

ingress: true
ingress_port: 8098

ports:
  8098/tcp: 8098
ports_description:
  8098/tcp: "Brick Library Web UI (direct)"

image: "ghcr.io/nikolausstoll/brick-library"

options:
  port: 8098
  db_path: "/data/brick-library.db"
  static_dir: "/app/public"
  upload_dir: "/data/uploads"
  image_quality: 80
  image_max_dimension: 2400

schema:
  port: int(1024,65535)
  db_path: str
  static_dir: str
  upload_dir: str
  image_quality: int
  image_max_dimension: int
